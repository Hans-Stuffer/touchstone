<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="touchstone">
  <defs>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c313c"/>
      <stop offset="1" stop-color="#161922"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#c79324"/>
      <stop offset="0.5" stop-color="#ffd75e"/>
      <stop offset="1" stop-color="#eeb12a"/>
    </linearGradient>
  </defs>
  <!-- the touchstone: a dark slate tile -->
  <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#stone)"/>
  <rect x="8.75" y="8.75" width="238.5" height="238.5" rx="53.25" fill="none" stroke="#3c4456" stroke-opacity="0.55" stroke-width="1.5"/>
  <!-- a faint earlier streak, for texture -->
  <path d="M86 182 L162 92" fill="none" stroke="#7c6a30" stroke-opacity="0.4" stroke-width="10" stroke-linecap="round"/>
  <!-- the gold streak struck across the stone: the test mark -->
  <path d="M64 190 C 98 152, 152 96, 192 62" fill="none" stroke="url(#gold)" stroke-width="21" stroke-linecap="round"/>
  <!-- bright highlight along the streak -->
  <path d="M72 184 C 102 150, 150 100, 186 70" fill="none" stroke="#fff2c8" stroke-opacity="0.5" stroke-width="5.5" stroke-linecap="round"/>
</svg>

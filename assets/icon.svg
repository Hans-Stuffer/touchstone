<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="touchstone">
  <defs>
    <linearGradient id="stone" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#363c4a"/>
      <stop offset="0.5" stop-color="#222734"/>
      <stop offset="1" stop-color="#121520"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.24" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0.1" y1="0.95" x2="0.95" y2="0.05">
      <stop offset="0" stop-color="#8c641b"/>
      <stop offset="0.4" stop-color="#f3c452"/>
      <stop offset="0.58" stop-color="#fff0bf"/>
      <stop offset="0.78" stop-color="#f0b738"/>
      <stop offset="1" stop-color="#bd8a26"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- stone slab -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#stone)"/>
  <!-- top-left light sheen -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#sheen)"/>
  <!-- rim bevel highlight -->
  <rect x="9.25" y="9.25" width="237.5" height="237.5" rx="54.75" fill="none" stroke="#5b6577" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- faint rubbed scratches, parallel to the main streak -->
  <g fill="none" stroke="#d8b768" stroke-linecap="round">
    <path d="M58 176 C 92 144, 142 94, 176 60" stroke-opacity="0.28" stroke-width="3"/>
    <path d="M82 200 C 116 168, 166 118, 200 84" stroke-opacity="0.22" stroke-width="2.5"/>
  </g>

  <!-- the gold streak: struck across the stone -->
  <g filter="url(#glow)">
    <path d="M66 190 C 100 156, 152 100, 190 66" fill="none" stroke="url(#gold)" stroke-width="19" stroke-linecap="round"/>
  </g>
  <!-- bright specular line along the streak -->
  <path d="M72 184 C 104 152, 148 104, 184 72" fill="none" stroke="#fff6da" stroke-opacity="0.6" stroke-width="4.5" stroke-linecap="round"/>

  <!-- glint at the bright end -->
  <g fill="#fff7e0">
    <circle cx="188" cy="68" r="4.5" fill-opacity="0.9"/>
    <path d="M188 55 L191 68 L188 81 L185 68 Z" fill-opacity="0.5"/>
    <path d="M175 68 L188 65 L201 68 L188 71 Z" fill-opacity="0.5"/>
  </g>
</svg>
